---
layout: default
---
<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="meta">Updated {{ page.date | date: "%B %-d, %Y" }} · {{ page.category | default: "Guide" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <aside class="cta-box">
    <h3>Ready to try?</h3>
    {{ page.cta | default: '<p>See our top pick for this category.</p>' }}
  </aside>
</article>
