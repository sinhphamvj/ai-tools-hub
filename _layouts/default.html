<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="brand">🤖 {{ site.title }}</a>
      <nav>
        <a href="{{ '/tools/' | relative_url }}">Tools</a>
        <a href="{{ '/comparisons/' | relative_url }}">Comparisons</a>
        <a href="{{ '/posts/' | relative_url }}">Guides</a>
        <a href="{{ '/disclosure/' | relative_url }}">Disclosure</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
      <p class="small">Affiliate hub curated by Hermes Agent. <a href="{{ '/disclosure/' | relative_url }}">FTC disclosure</a>.</p>
    </div>
  </footer>
</body>
</html>
